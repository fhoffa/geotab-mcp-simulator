name: version-assets

# Keeps index.html's cache-busting query strings in sync automatically: any
# push to main touching app.js, styles.css, or data/conversations.js gets
# stamped with that file's own commit hash, so GitHub Pages visitors never
# see a stale cached copy after a deploy.
on:
  push:
    branches: [main]
    paths:
      - app.js
      - styles.css
      - data/conversations.js

permissions:
  contents: write

jobs:
  version-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/version-assets.js
      - run: |
          if git diff --quiet -- index.html; then
            echo "no version changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: bump cache-busting asset versions"
          git push
