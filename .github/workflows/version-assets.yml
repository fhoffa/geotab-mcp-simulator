name: version-assets

# Keeps index.html's cache-busting query strings in sync automatically. Runs
# on PRs that touch app.js, styles.css, or data/conversations.js and pushes
# the stamped index.html back to the PR branch *before* it merges to main —
# a bot commit straight to main wouldn't trigger a Pages rebuild (pushes
# made with the default GITHUB_TOKEN don't fire downstream events), so the
# stamp has to land before the merge, not after it.
on:
  pull_request:
    paths:
      - app.js
      - styles.css
      - data/sample-data.js
      - data/conversations.js

permissions:
  contents: write

jobs:
  version-assets:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/version-assets.js
      - run: |
          if git diff --quiet -- index.html; then
            echo "no version changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: bump cache-busting asset versions"
          git push origin HEAD:${{ github.head_ref }}
