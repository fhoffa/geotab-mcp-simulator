name: check-graph

# The repo's integrity gate: fail the build on any broken conversation-graph
# link or unreachable node, so a bad data/conversations.js can't ship silently.
#
# On PRs from this repo it also keeps docs/CONVERSATION-MAP.md's node table in
# sync automatically — machine-derived docs should be machine-written, not
# nagged about. Mirrors version-assets.yml's push-back pattern (the fix has to
# land on the PR branch before merge; a bot push straight to main wouldn't
# retrigger downstream events). Fork PRs skip the push and fall back to the
# check failing with the --fix-map instruction.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  check-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Same-repo PRs check out the head branch so the fix-map step can push
          # back to it. Fork PRs must NOT use head_ref — that branch doesn't
          # exist in this repo, so checkout would fail before the push step's
          # same-repo guard could skip it; they get the default merge-commit
          # checkout and the plain drift check instead.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref || '' }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate the map-doc node table
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          node scripts/check-graph.js --fix-map
          if git diff --quiet -- docs/CONVERSATION-MAP.md; then
            echo "map table already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CONVERSATION-MAP.md
          git commit -m "Regenerate conversation-map node table"
          # version-assets may push a stamp commit on the same event — rebase past it
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}
      - run: node scripts/check-graph.js
