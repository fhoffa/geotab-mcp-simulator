name: check-graph

# The repo's integrity gate: fail the build on any broken conversation-graph
# link or unreachable node, so a bad data/conversations.js can't ship silently.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-graph.js
